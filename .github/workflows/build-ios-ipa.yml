name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
permissions:
  contents: read

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
      IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
      KEYCHAIN_NAME: build.keychain
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          missing=0
          for key in IOS_P12_BASE64 IOS_P12_PASSWORD IOS_MOBILEPROVISION_BASE64 IOS_TEAM_ID IOS_SIGNING_IDENTITY IOS_PROVISIONING_PROFILE_SPECIFIER; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download embedded CPython runtime (BeeWare)
        working-directory: ios
        env:
          PYTHON_SUPPORT_TAG: 3.13-b13
          PYTHON_SUPPORT_FILE: Python-3.13-iOS-support.b13.tar.gz
        run: |
          set -euo pipefail
          RUNTIME_DIR="$RUNNER_TEMP/python-runtime"
          ARCHIVE_PATH="$RUNNER_TEMP/$PYTHON_SUPPORT_FILE"
          rm -rf "$RUNTIME_DIR" Vendor/Python.xcframework App/Resources/PythonRuntime
          mkdir -p "$RUNTIME_DIR" Vendor App/Resources/PythonRuntime/lib

          curl -L \
            "https://github.com/beeware/Python-Apple-support/releases/download/$PYTHON_SUPPORT_TAG/$PYTHON_SUPPORT_FILE" \
            -o "$ARCHIVE_PATH"

          tar -xzf "$ARCHIVE_PATH" -C "$RUNTIME_DIR"

          cp -R "$RUNTIME_DIR/Python.xcframework" Vendor/Python.xcframework
          cp -R "$RUNTIME_DIR/Python.xcframework/lib/python3.13" App/Resources/PythonRuntime/lib/python3.13

          # Overlay architecture-specific extension modules for iOS device.
          rsync -a \
            "$RUNTIME_DIR/Python.xcframework/ios-arm64/lib-arm64/python3.13/" \
            "App/Resources/PythonRuntime/lib/python3.13/"

          # Trim large folders to keep IPA size reasonable.
          rm -rf \
            App/Resources/PythonRuntime/lib/python3.13/test \
            App/Resources/PythonRuntime/lib/python3.13/idlelib \
            App/Resources/PythonRuntime/lib/python3.13/tkinter \
            App/Resources/PythonRuntime/lib/python3.13/turtledemo \
            App/Resources/PythonRuntime/lib/python3.13/ensurepip

      - name: Decode signing assets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$IOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/certificate.p12"
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"
          echo "P12_PATH=$RUNNER_TEMP/signing/certificate.p12" >> $GITHUB_ENV
          echo "PROFILE_PATH=$RUNNER_TEMP/signing/profile.mobileprovision" >> $GITHUB_ENV
          echo "P12_PASSWORD=$IOS_P12_PASSWORD" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$(openssl rand -base64 24)" >> $GITHUB_ENV

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db
          security default-keychain -s "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run unit tests (if simulator available)
        continue-on-error: true
        working-directory: ios
        run: |
          set -euo pipefail
          SIM_NAME=$(xcrun simctl list devices available | sed -n 's/^[[:space:]]*\([^()]*iPhone[^()]*\) (.*/\1/p' | head -n1 | sed 's/[[:space:]]*$//')
          if [ -z "${SIM_NAME:-}" ]; then
            echo "No iOS Simulator runtime available on this runner. Skip unit tests."
            exit 0
          fi
          echo "Using simulator: $SIM_NAME"
          xcodebuild \
            -project ChatAppiOS.xcodeproj \
            -scheme ChatApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            test

      - name: Override bundle identifier if provided
        if: env.IOS_BUNDLE_ID != ''
        working-directory: ios
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $IOS_BUNDLE_ID" App/Resources/Info.plist || true

      - name: Create export options
        working-directory: ios
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD:-ad-hoc}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID:-com.chatapp.ios}</key>
              <string>${IOS_PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${IOS_SIGNING_IDENTITY}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Archive app
        working-directory: ios
        run: |
          xcodebuild \
            -project ChatAppiOS.xcodeproj \
            -scheme ChatApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/ChatApp.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_IDENTITY="$IOS_SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            PRODUCT_BUNDLE_IDENTIFIER="${IOS_BUNDLE_ID:-com.chatapp.ios}" \
            archive

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ChatApp.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/exported"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatapp-ipa
          path: |
            ${{ runner.temp }}/exported/*.ipa
            ${{ runner.temp }}/ChatApp.xcarchive

      - name: Cleanup signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
          rm -f "$P12_PATH" "$PROFILE_PATH" || true
