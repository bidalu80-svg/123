name: ChatAppiOS
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: IEXA
    PRODUCT_BUNDLE_IDENTIFIER: com.chatapp.ios
    DEVELOPMENT_LANGUAGE: zh-Hans
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 2.0.0
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    CODE_SIGN_STYLE: Manual
    CHAT_API_URL: "http://8.218.177.114"
    CHAT_MODEL: "astron-code-latest"
    GOOGLE_CLIENT_ID: ""
    GOOGLE_REVERSED_CLIENT_ID: ""
    GENERATE_INFOPLIST_FILE: NO
targets:
  ChatApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Sources
      - path: App/Resources
        excludes:
          - PythonRuntime/**
      - path: App/Resources/PythonRuntime
        type: folder
    dependencies:
      - framework: Vendor/Python.xcframework
        embed: true
        codeSign: true
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_NAME: IEXA
        PRODUCT_MODULE_NAME: ChatApp
        PRODUCT_BUNDLE_IDENTIFIER: com.chatapp.ios
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/PhoneBridge.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: $(IOS_TEAM_ID)
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: $(IOS_SIGNING_IDENTITY)
        PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROVISIONING_PROFILE_SPECIFIER)
    scheme:
      gatherCoverageData: true
      testTargets:
        - ChatAppTests
        - ChatAppUITests
  ChatAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: ChatApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chatapp.ios.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/IEXA.app/IEXA
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
  ChatAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: ChatApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chatapp.ios.uitests
        TEST_TARGET_NAME: ChatApp
        GENERATE_INFOPLIST_FILE: YES
